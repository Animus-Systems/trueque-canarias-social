services:
  postgres:
    image: postgres:16-alpine
    container_name: trueque-canarias-social-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trueque_canarias_social
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trueque_canarias_social"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
